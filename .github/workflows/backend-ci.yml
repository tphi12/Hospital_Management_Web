name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'BE/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'BE/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    defaults:
      run:
        working-directory: ./BE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: BE/package-lock.json
      
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: BE/node_modules
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('BE/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Lint code (if configured)
        run: npm run lint || echo "No lint script configured"
        continue-on-error: true
      
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
      
      - name: Check if server.js exists
        run: |
          if [ -f "src/server.js" ]; then
            echo "Server file exists"
          else
            echo "Server file not found"
            exit 1
          fi
      
      - name: Build check (verify no syntax errors)
        run: node --check src/server.js
      
      - name: Upload coverage reports (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: BE/coverage/
          if-no-files-found: ignore

  code-quality:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./BE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: BE/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for outdated packages
        run: npm outdated || true
      
      - name: Check package.json format
        run: |
          if [ -f "package.json" ]; then
            node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
            echo "✓ package.json is valid JSON"
          fi

  security:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./BE
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Check for secrets in code
        run: |
          echo "Checking for potential secrets..."
          ! grep -r "password\s*=\s*['\"]" src/ || echo "⚠️  Warning: Found hardcoded passwords"
          ! grep -r "api[_-]key\s*=\s*['\"]" src/ || echo "⚠️  Warning: Found hardcoded API keys"
